<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">

    <title>Spring AI + Gemini</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2>Spring AI + Gemini Chatbot</h2>

    <form action="/chat" method="post">

        <textarea
                class="form-control"
                rows="5"
                name="prompt"
                placeholder="Ask anything..."></textarea>

        <br>

        <button class="btn btn-primary">
            Ask Gemini
        </button>

    </form>

    <hr>

    <div th:if="${prompt}">
        <h4>Question</h4>
        <p th:text="${prompt}"></p>
    </div>

    <div th:if="${response}">
        <h4>Response</h4>
        <div class="alert alert-success"
             th:text="${response}">
        </div>
    </div>

</div>

</body>
</html>
